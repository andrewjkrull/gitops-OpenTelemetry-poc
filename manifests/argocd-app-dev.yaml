# manifests/argocd-app-dev.yaml
# ArgoCD Application for the dev environment.
# Auto-sync enabled — any push to sensor-demo-deploy main branch
# is automatically applied to the sensor-dev namespace.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sensor-demo-dev
  namespace: argocd
  labels:
    environment: dev
spec:
  project: default

  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/poc/sensor-demo-deploy
    targetRevision: main
    path: envs/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: sensor-dev

  syncPolicy:
    automated:
      prune: true        # remove resources deleted from git
      selfHeal: true     # revert manual changes to the cluster
    syncOptions:
      - CreateNamespace=false  # namespace already exists
