# manifests/argocd-app-qa.yaml
# ArgoCD Application for the qa environment.
# Manual sync — changes must be explicitly approved and synced in ArgoCD UI.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sensor-demo-qa
  namespace: argocd
  labels:
    environment: qa
spec:
  project: default

  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/poc/sensor-demo-deploy
    targetRevision: main
    path: envs/qa

  destination:
    server: https://kubernetes.default.svc
    namespace: sensor-qa

  syncPolicy:
    syncOptions:
      - CreateNamespace=false
