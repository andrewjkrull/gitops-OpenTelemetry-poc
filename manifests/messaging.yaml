# manifests/messaging.yaml
# Deploys the messaging namespace with Mosquitto (MQTT), Redis, and Kafka (KRaft, SASL/PLAIN)
#
# IMPORTANT: No credentials are embedded in this file.
# All passwords and auth config are created by scripts/messaging-init.sh BEFORE this file is applied.
#
# Apply order:
#   1. scripts/messaging-init.sh     (creates Secrets: mosquitto-passwd, redis-password, kafka-jaas)
#   2. manifests/messaging.yaml      (this file — workloads reference those Secrets)

# ── Namespace ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: messaging
---

# ── Mosquitto (MQTT broker) ────────────────────────────────────────────────────
# Config: auth required, password file from Secret
# Password file generated by messaging-init.sh using mosquitto_passwd
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: messaging
data:
  mosquitto.conf: |
    listener 1883
    protocol mqtt
    allow_anonymous false
    password_file /mosquitto/config/passwd
    persistence false
    log_dest stdout
    log_type all
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: messaging
  labels:
    app: mosquitto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.0
          ports:
            - containerPort: 1883
              name: mqtt
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
            - name: passwd
              mountPath: /mosquitto/config/passwd
              subPath: passwd
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: mosquitto-config
        - name: passwd
          secret:
            secretName: mosquitto-passwd
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: messaging
spec:
  selector:
    app: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
---

# ── Redis ──────────────────────────────────────────────────────────────────────
# Password injected from Secret created by messaging-init.sh
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: messaging
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--loglevel", "notice", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-password
                  key: password
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: messaging
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---

# ── Kafka (KRaft mode, SASL/PLAIN) ────────────────────────────────────────────
# Single-node KRaft — no ZooKeeper required
# JAAS config (with broker credentials) comes from Secret created by messaging-init.sh
# Client (app) credentials are in Vault KV secret/apps/kafka — never here
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: messaging
data:
  server.properties: |
    # KRaft mode — combined broker + controller
    process.roles=broker,controller
    node.id=1
    controller.quorum.voters=1@localhost:9093

    # Listeners
    # SASL_PLAINTEXT for client traffic, CONTROLLER (plaintext) for internal KRaft
    listeners=SASL_PLAINTEXT://:9092,CONTROLLER://:9093
    advertised.listeners=SASL_PLAINTEXT://kafka.messaging.svc.cluster.local:9092
    inter.broker.listener.name=SASL_PLAINTEXT
    controller.listener.names=CONTROLLER
    listener.security.protocol.map=SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT

    # SASL
    sasl.enabled.mechanisms=PLAIN
    sasl.mechanism.inter.broker.protocol=PLAIN

    # Storage
    log.dirs=/var/kafka/data

    # Topic defaults suitable for single-node PoC
    auto.create.topics.enable=true
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    default.replication.factor=1
    min.insync.replicas=1

    # Retention: short for PoC — keeps disk usage minimal
    log.retention.hours=1
    log.segment.bytes=104857600

  # Startup script: initialises the KRaft cluster ID on first boot, then starts Kafka
  # The JAAS config is loaded via KAFKA_OPTS from the kafka-jaas Secret (env var)
  start.sh: |
    #!/bin/bash
    set -e
    STORAGE_DIR=/var/kafka/data
    META_FILE="${STORAGE_DIR}/meta.properties"

    if [ ! -f "${META_FILE}" ]; then
      echo "Initialising KRaft storage..."
      CLUSTER_ID=$(/opt/kafka/bin/kafka-storage.sh random-uuid)
      /opt/kafka/bin/kafka-storage.sh format -t "${CLUSTER_ID}" -c /opt/kafka/config/server.properties
    fi

    exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: messaging
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          command: ["/bin/bash", "/opt/kafka/config/start.sh"]
          ports:
            - containerPort: 9092
              name: sasl-plaintext
            - containerPort: 9093
              name: controller
          env:
            # KAFKA_OPTS loads the JAAS config from the mounted Secret file.
            # The file contains PLAIN LoginModule config with broker + user credentials.
            # Created by messaging-init.sh — never stored in a ConfigMap.
            - name: KAFKA_OPTS
              value: "-Djava.security.auth.login.config=/etc/kafka/jaas/kafka-jaas.conf"
          volumeMounts:
            - name: config
              mountPath: /opt/kafka/config/server.properties
              subPath: server.properties
            - name: config
              mountPath: /opt/kafka/config/start.sh
              subPath: start.sh
            - name: jaas
              mountPath: /etc/kafka/jaas
              readOnly: true
            - name: data
              mountPath: /var/kafka/data
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: kafka-config
            defaultMode: 0755
        - name: jaas
          secret:
            secretName: kafka-jaas
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: messaging
spec:
  selector:
    app: kafka
  ports:
    - name: sasl-plaintext
      port: 9092
      targetPort: 9092
