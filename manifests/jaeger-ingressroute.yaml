# Phase 6 — Jaeger UI IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jaeger
  namespace: observability
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jaeger.test`)
      kind: Rule
      services:
        - name: jaeger-query
          port: 16686
  tls:
    secretName: jaeger-tls
